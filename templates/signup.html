{% extends "base.html" %}
{% block title %}Sign Up — FlaskApp{% endblock %}

{% block content %}
<div class="card">
  <div class="card-logo">
    <div class="dot"></div>
    <span>FlaskApp</span>
  </div>

  <h1>Create account</h1>
  <p class="subtitle">Get started for free — no credit card needed.</p>

  <form method="POST" action="{{ url_for('signup') }}">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username"
             placeholder="yourname" autocomplete="username" required>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email"
             placeholder="you@example.com" autocomplete="email" required>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="Min. 6 characters" autocomplete="new-password" required>
    </div>

    <div class="form-group">
      <label for="confirm_password">Confirm Password</label>
      <input type="password" id="confirm_password" name="confirm_password"
             placeholder="Repeat password" autocomplete="new-password" required>
    </div>

    <button type="submit" class="btn btn-primary">Create Account →</button>
  </form>

  <hr class="divider">
  <p class="link-row">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</div>
{% endblock %}
