{% extends "base.html" %}
{% block title %}Log In — FlaskApp{% endblock %}

{% block content %}
<div class="card">
  <div class="card-logo">
    <div class="dot"></div>
    <span>FlaskApp</span>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Log in to your account to continue.</p>

  <form method="POST" action="{{ url_for('login') }}">
    <div class="form-group">
      <label for="identifier">Email or Username</label>
      <input type="text" id="identifier" name="identifier"
             placeholder="you@example.com" autocomplete="username" required>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="••••••••" autocomplete="current-password" required>
    </div>

    <button type="submit" class="btn btn-primary">Log In →</button>
  </form>

  <hr class="divider">
  <p class="link-row">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
</div>
{% endblock %}
